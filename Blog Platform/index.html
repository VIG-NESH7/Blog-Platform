<!DOCTYPE html>
<html>
<head>
  <title>Blog Platform</title>
  <link rel="stylesheet" href="style3.css">
</head>
<body>

  <nav>
    <h2>BlogApp</h2>
    <div>
      <button onclick="showPage('login')">Login</button>
      <button onclick="showPage('register')">Register</button>
      <button onclick="showPage('create')">Create Post</button>
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <section id="register" class="page">
    <h2>Register</h2>
    <input id="regName" placeholder="Username">
    <input id="regEmail" placeholder="Email">
    <input id="regPassword" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
  </section>

  <section id="login" class="page">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </section>

  <section id="home" class="page active">
    <h2>All Blog Posts</h2>
    <div id="posts"></div>
  </section>

  <section id="create" class="page">
    <h2>Create Blog Post</h2>
    <input id="postTitle" placeholder="Post Title">
    <textarea id="postContent" placeholder="Write your post"></textarea>
    <button onclick="createPost()">Publish</button>
  </section>

  <section id="details" class="page">
    <div id="postDetails"></div>

    <h3>Comments</h3>
    <div id="comments"></div>

    <input id="commentInput" placeholder="Write a comment">
    <button onclick="addComment()">Add Comment</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
